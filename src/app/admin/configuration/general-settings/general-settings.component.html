<section class="content">
    <div class="container-fluid">
        <div class="form-horizontal">
            <div id="languages-grid_wrapper" class="dataTables_wrapper dt-bootstrap4 no-footer">

                    <c-col>

                                <strong>General settings</strong>
                                <div class="btn-container d-md-flex flex-md-row d-flex flex-column gap-2">
                                    <a (click)="saveGeneralSettingsData()" class="btn btn-primary btn-sm text-white"
                                        [title]="getLabelValue('admin.generalsettings.header.saveButton.hint')"
                                        data-bs-toggle="tooltip" data-bs-placement="bottom">
                                        <i class="fas fa-save me-1"></i>
                                        {{getLabelValue('admin.generalsettings.header.saveButton.value')}}
                                    </a>
                                </div>
                            </c-card-header>

                                                    </div>

                                                <div class="col-md-9">

                                                    </div>

                                                            {{getLabelValue('admin.generalsettings.common.storeName.error')}}
                                                        </div> -->

                                            </div>

                                                        <label class="col-form-label me-3"

                                                            data-toggle="tooltip" class="ico-help">
                                                            <i class="fas fa-question-circle text-primary"></i>
                                                        </div>
                                                    </div>
                                                </div>

                                                        <div class="image-container">
                                                            <input type="file" id="logo"
                                                                (change)="onFileSelected($event)" accept="image/*"
                                                                hidden />

                                                                <ng-container *ngIf="!selectedImage">
                                                                    <i class="fas fa-plus text-primary"></i>
                                                                </ng-container>

                                                                    <button type="button" class="cancel-btn"

                                                                        <i class="fas fa-times"></i>
                                                                    </button>
                                                                </ng-container>
                                                            </div>
                                                        </div>
                                                    </div> -->

                                                <div class="col-md-9">
                                                    <div class="image-container">

                                                            <ng-container *ngIf="selectedImageForLogo">

                                                                <button type="button" class="cancel-btn"
                                                                    (click)="removeImage($event, 'commonLogo')">
                                                                    <i class="fas fa-times"></i>
                                                                </button>
                                                            </ng-container>
                                                        </div>

                                                            <i class="fas fa-question-circle text-primary"></i>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-md-9">
                                                    <input id="displayEuCookieLawWarning"
                                                        formControlName="displayEuCookieLawWarning" type="checkbox" />
                                                </div>
                                            </div>

                                            <div class="form-group row mb-1 align-items-center">

                                                        <div [title]="getLabelValue('admin.generalsettings.common.storeClosed.hint')"

                                                            <i class="fas fa-question-circle text-primary"></i>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-md-9">
                                                    <input id="storeClosed" formControlName="storeClosed"

                                                </div>
